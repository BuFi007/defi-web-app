# BUFX Yield Engine — indexed by Envio HyperIndex
# Tracks trading fees, lending rates, and composite yield per market.

type PerpTrade {
  id: ID!
  marketId: String! @index
  maker: String! @index
  taker: String! @index
  sizeDeltaE18: BigInt!
  priceE18: BigInt!
  fee: BigInt!
  txHash: String!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type SpotSwap {
  id: ID!
  requestId: String! @index
  routeId: String! @index
  sender: String! @index
  baseToken: String!
  quoteToken: String!
  baseAmount: BigInt!
  quoteAmount: BigInt!
  midE18: BigInt!
  appliedSpreadBps: BigInt!
  txHash: String!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type FundingEvent {
  id: ID!
  marketId: String! @index
  version: BigInt!
  fundingRateE18: BigInt!
  cumulativeFundingE18: BigInt!
  timestamp: Int!
  chainId: Int!
}

type PositionChange {
  id: ID!
  marketId: String! @index
  trader: String! @index
  action: String! @index
  sizeDeltaE18: BigInt!
  resultingSizeE18: BigInt!
  entryPriceE18: BigInt!
  fee: BigInt!
  realizedPnl: BigInt!
  badDebt: BigInt!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type LendingEvent {
  id: ID!
  marketId: String! @index
  caller: String!
  onBehalf: String! @index
  assets: BigInt!
  shares: BigInt!
  action: String! @index
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type TradingFeeRoute {
  id: ID!
  marketId: String! @index
  trader: String! @index
  feeVault: String! @index
  amount: BigInt!
  source: String! @index
  txHash: String!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type TurboFeeVaultEvent {
  id: ID!
  eventType: String! @index
  marketId: String! @index
  user: String! @index
  token: String!
  amount: BigInt!
  protocolShare: BigInt!
  lpShare: BigInt!
  insuranceShare: BigInt!
  assets: BigInt!
  shares: BigInt!
  reason: String!
  txHash: String!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

# Aggregated daily snapshot per market — derived by handlers.
type DailyMarketSnapshot {
  id: ID!
  marketId: String! @index
  date: String! @index
  chainId: Int!
  # Perps
  perpVolume: BigInt!
  perpFees: BigInt!
  perpTradeCount: Int!
  # Spot
  spotVolume: BigInt!
  spotTradeCount: Int!
  # Lending
  totalSupply: BigInt!
  totalBorrow: BigInt!
  supplyEvents: Int!
  borrowEvents: Int!
  # Turbo fee vault
  turboFeeAmount: BigInt!
  turboProtocolShare: BigInt!
  turboLpShare: BigInt!
  turboInsuranceShare: BigInt!
  lpDepositEvents: Int!
  lpWithdrawEvents: Int!
  yieldClaimed: BigInt!
  insurancePayouts: BigInt!
  # Funding
  lastFundingRate: BigInt!
  cumulativeFundingE18: BigInt!
  # Derived yield (computed per snapshot, 1e18 precision)
  morphoBaseApy: BigInt!
  feeBoostApy: BigInt!
  compositeApy: BigInt!
  annualizedFeeApy: BigInt!
}
