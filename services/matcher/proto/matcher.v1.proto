// BUFI matcher v1 — source of truth for cross-language types.
//
// The `SignedOrder` message mirrors `FxOrderSettlement.SignedOrder` from
// fx-telarana/contracts/src/perp/interfaces/IFxOrderSettlement.sol field-for-
// field. Bytes hashed under the EIP-712 typehash
//
//   "SignedOrder(address trader,bytes32 marketId,int256 sizeDeltaE18,
//                uint256 priceE18,uint256 maxFee,uint8 orderType,uint8 flags,
//                uint64 nonce,uint64 deadline)"
//
// must equal the bytes the contract recovers. Any edit here that touches the
// canonical fields MUST land alongside an update to:
//   - docs/matcher-architecture.md §gRPC + §Wire format
//   - crates/matcher-types/src/eip712.rs `SignedOrder` sol! block
//   - crates/orderbook/src/order.rs `Intent` struct
// in the same PR.
//
// Numeric encoding:
//   - `bytes` carries 32-byte big-endian encodings for u256 (`price_e18`,
//     `max_fee`) and i256 two's-complement (`size_delta_e18`,
//     `residual_size_delta_e18`).
//   - `uint64` for `nonce`, `deadline_secs`, `timestamp_ms`, `sequence_number`.
//   - `uint32` for `flags` (proto3 has no `uint8`; on-chain narrows to `uint8`).
//   - Never `double` or `float`.

syntax = "proto3";

package matcher.v1;

// =============================================================================
// Service
// =============================================================================

service Matcher {
  // Submit a signed order. Returns synchronously with the match outcome.
  // User-facing latency budget: < 200 ms.
  rpc SubmitOrder(SignedOrder) returns (MatchResult);

  // Cancel a resting order by intent id. Idempotent.
  rpc CancelOrder(IntentRef) returns (CancelResult);

  // Snapshot the current book for one market.
  rpc GetBook(MarketRef) returns (BookSnapshot);

  // Streaming book updates. First message after subscribe has `snapshot=true`;
  // clients MUST discard prior local state on every such message.
  rpc StreamBook(BookSubscription) returns (stream BookUpdate);

  // Streaming trade tape — one Trade per fill, across all subscribed markets.
  rpc StreamTrades(TradeSubscription) returns (stream Trade);

  // Engine liveness + match-sequence state.
  rpc Health(HealthRequest) returns (HealthResponse);
}

// =============================================================================
// Enums
// =============================================================================

// Order side is encoded in the sign of `size_delta_e18` (positive = long,
// negative = short). This enum exists for `Trade.taker_side` so consumers
// don't have to re-derive from a bytes field.
enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_LONG = 1;
  SIDE_SHORT = 2;
}

// Matches `FxOrderSettlement.ORDER_TYPE_{MARKET,LIMIT}` (0 / 1).
enum OrderType {
  ORDER_TYPE_MARKET = 0;
  ORDER_TYPE_LIMIT = 1;
}

// Matcher-only — NOT part of the EIP-712 typehash, derived/overridden off-chain.
enum TimeInForce {
  TIF_UNSPECIFIED = 0;
  TIF_GTC = 1;
  TIF_IOC = 2;
  TIF_FOK = 3;
}

enum MatchStatus {
  MATCH_STATUS_UNSPECIFIED = 0;
  MATCH_STATUS_FILLED = 1;
  MATCH_STATUS_PARTIAL = 2;
  MATCH_STATUS_RESTING = 3;
  MATCH_STATUS_REJECTED = 4;
}

enum CancelStatus {
  CANCEL_STATUS_UNSPECIFIED = 0;
  CANCEL_STATUS_CANCELED = 1;
  CANCEL_STATUS_NOT_FOUND = 2;
  CANCEL_STATUS_ALREADY_FILLED = 3;
}

// =============================================================================
// Wire-format-canonical SignedOrder (mirrors fx-telarana SignedOrder)
// =============================================================================

// Field order + types MUST match
// `FxOrderSettlement.SIGNED_ORDER_TYPEHASH`. Do not reorder fields 1-9.
// Fields 10+ are matcher-only and NOT part of the EIP-712 hash.
message SignedOrder {
  // (1) 20-byte trader address.
  bytes trader = 1;
  // (2) Market id, bytes32, key into `FxPerpClearinghouse._marketConfig`.
  bytes market_id = 2;
  // (3) Signed int256, 18-dec WAD. Sign encodes side: positive = long, negative = short.
  bytes size_delta_e18 = 3;
  // (4) Unsigned uint256, 18-dec WAD. Required for LIMIT; ignored for MARKET.
  bytes price_e18 = 4;
  // (5) Unsigned uint256. Max fee in USDC E18. 0 = uncapped (current keeper default).
  bytes max_fee = 5;
  // (6) 0 = MARKET, 1 = LIMIT.
  OrderType order_type = 6;
  // (7) Bitfield, narrows to uint8 on-chain: bit 0 = REDUCE_ONLY, bit 1 = POST_ONLY.
  uint32 flags = 7;
  // (8) Permit2 bitmap index — NOT monotonic. Position is `bit (nonce & 0xff)`
  //     in `nonceBitmap[trader][nonce >> 8]`.
  uint64 nonce = 8;
  // (9) Unix **seconds** upper bound (matches `block.timestamp`).
  uint64 deadline_secs = 9;

  // -------- Below this line: matcher-only, NOT in EIP-712 typehash --------

  // EIP-712 signature (65 bytes: r || s || v).
  bytes signature = 10;
  // Matcher-only TIF.
  TimeInForce tif = 11;
  // Optional client tag, echoed in fills for latency tracing.
  string client_tag = 12;
}

message IntentRef {
  // bytes32 intent id (keccak256 of the EIP-712-hashed `SignedOrder`).
  bytes intent_id = 1;
  bytes market_id = 2;
}

message MarketRef {
  bytes market_id = 1;
}

message MatchResult {
  IntentRef intent_ref = 1;
  repeated Fill fills = 2;
  MatchStatus status = 3;
  optional string reject_reason = 4;
}

message CancelResult {
  IntentRef intent_ref = 1;
  CancelStatus status = 2;
  // Magnitude remaining on book at cancel time, uint256 E18 big-endian.
  // 0 if already filled or not found.
  bytes residual_size = 3;
}

// =============================================================================
// Book streaming
// =============================================================================

message BookSubscription {
  repeated bytes market_ids = 1;
}

message BookSnapshot {
  bytes market_id = 1;
  // Bids descending by price, asks ascending.
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
  uint64 sequence_number = 4;
  uint64 timestamp_ms = 5;
}

message BookUpdate {
  bytes market_id = 1;
  // On `true`: clients discard prior state for this market and rebuild from `levels`.
  // On `false`: apply the diffs in `levels` to existing state.
  bool snapshot = 2;
  repeated PriceLevel levels = 3;
  // Monotonic per market.
  uint64 sequence_number = 4;
  uint64 timestamp_ms = 5;
}

message PriceLevel {
  Side side = 1;
  // 18-dec WAD, big-endian u256.
  bytes price = 2;
  // 18-dec WAD magnitude, big-endian u256. Zero = remove this level.
  bytes size = 3;
  uint64 sequence_number = 4;
}

// =============================================================================
// Trade tape
// =============================================================================

message TradeSubscription {
  repeated bytes market_ids = 1;
}

message Trade {
  // bytes32 fill identifier — deterministic hash of
  // (maker_intent_id, taker_intent_id, sequence_no).
  bytes fill_id = 1;
  bytes maker_intent_id = 2;
  bytes taker_intent_id = 3;
  bytes market_id = 4;
  Side taker_side = 5;
  // 18-dec WAD, big-endian u256.
  bytes price = 6;
  bytes size = 7;
  uint64 timestamp_ms = 8;
  // Cumulative quantums filled on each intent up to and including this fill.
  bytes maker_cumulative_filled = 9;
  bytes taker_cumulative_filled = 10;
  // Phase 4+: true when the counter-party is the LP vault.
  bool is_lp_fill = 11;
  // Phase 5+: true when the taker is a protocol-generated liquidation order.
  bool is_liquidation = 12;
}

// Same shape as `Trade` but emitted synchronously inside `MatchResult.fills`.
// Kept separate so the RPC and stream can evolve independently.
message Fill {
  bytes fill_id = 1;
  bytes maker_intent_id = 2;
  bytes taker_intent_id = 3;
  bytes market_id = 4;
  Side taker_side = 5;
  bytes price = 6;
  bytes size = 7;
  uint64 timestamp_ms = 8;
  bool is_lp_fill = 9;
}

// =============================================================================
// Health
// =============================================================================

message HealthRequest {}

message HealthResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_HEALTHY = 1;
    STATUS_DEGRADED = 2;
    STATUS_UNHEALTHY = 3;
  }
  Status status = 1;
  uint64 match_sequence_number = 2;
  uint64 last_fill_timestamp_ms = 3;
  uint64 uptime_seconds = 4;
  string version = 5;
}
