# Block the obvious ways non-determinism can slip into the matching core.
disallowed-methods = [
    { path = "std::time::SystemTime::now", reason = "Pass `now_ms: u64` in. The core never reads the clock." },
    { path = "std::time::Instant::now", reason = "Pass `now_ms: u64` in. The core never reads the clock." },
    { path = "rand::random", reason = "Derive ids deterministically from inputs." },
    { path = "rand::thread_rng", reason = "No RNG in the matching core." },
]
disallowed-types = [
    { path = "std::collections::HashMap", reason = "HashMap iteration order is randomised — use BTreeMap for determinism." },
    { path = "std::collections::HashSet", reason = "HashSet iteration order is randomised — use BTreeSet for determinism." },
]
