# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: bufx-yield-engine

contracts:
  # ─────────────────── Perps ───────────────────────────────────────
  - name: FxOrderSettlement
    abi_file_path: ./abis/FxOrderSettlement.json
    handler: ./src/handlers/perps.ts
    events:
      - event: MatchSettled(bytes32 indexed marketId, address indexed maker, address indexed taker, uint256 fillSizeE18, uint256 fillPriceE18)
        field_selection:
          transaction_fields:
            - hash
      - event: OrderCancelled(address indexed trader, uint256 nonce)
        field_selection:
          transaction_fields:
            - hash

  - name: FxPerpClearinghouse
    abi_file_path: ./abis/FxPerpClearinghouse.json
    handler: ./src/handlers/perps.ts
    events:
      - event: PositionIncreased(bytes32 indexed marketId, address indexed trader, int256 sizeDeltaE18, int256 resultingSizeE18, uint256 entryPriceE18, uint256 marginReserved, uint256 fee)
      - event: PositionDecreased(bytes32 indexed marketId, address indexed trader, int256 sizeDeltaE18, int256 resultingSizeE18, uint256 priceE18, uint256 marginReleased, int256 pnl, uint256 badDebt)
      - event: TradingFeeRouted(bytes32 indexed marketId, address indexed trader, address indexed feeVault, uint256 amount)

  - name: FxFundingEngine
    abi_file_path: ./abis/FxFundingEngine.json
    handler: ./src/handlers/perps.ts
    events:
      - event: FundingPoked(bytes32 indexed marketId, uint64 version, int256 rateE18PerSecond, int256 cumulativeFundingE18)

  # ─────────────────── Spot ────────────────────────────────────────
  - name: FxSpotExecutor
    abi_file_path: ./abis/FxSpotExecutor.json
    handler: ./src/handlers/spot.ts
    events:
      - event: SpotFxExecuted(bytes32 indexed requestId, bytes32 indexed routeId, address indexed recipient, address tokenOut, uint256 usdcIn, uint256 tokenOutDelivered, uint256 midE18, uint256 appliedSpreadBps)
        field_selection:
          transaction_fields:
            - hash
      - event: SpotFeeRouted(bytes32 indexed requestId, bytes32 indexed routeId, address indexed feeVault, uint256 amount)
        field_selection:
          transaction_fields:
            - hash

  # ─────────────────── TurboFeeVault ──────────────────────────────
  - name: TurboFeeVault
    abi_file_path: ./abis/TurboFeeVault.json
    handler: ./src/handlers/turboFeeVault.ts
    events:
      - event: FeeDeposited(bytes32 indexed marketId, address token, uint256 amount, uint256 protocolShare, uint256 lpShare, uint256 insuranceShare)
        field_selection:
          transaction_fields:
            - hash
      - event: Deposited(address indexed user, uint256 assets, uint256 shares)
        field_selection:
          transaction_fields:
            - hash
      - event: Withdrawn(address indexed user, uint256 shares, uint256 assets)
        field_selection:
          transaction_fields:
            - hash
      - event: YieldClaimed(address indexed user, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: InsurancePayout(bytes32 indexed marketId, uint256 amount, string reason)
        field_selection:
          transaction_fields:
            - hash

  # ─────────────────── Hedge ────────────────────────────────────
  - name: FxHedgeHook
    abi_file_path: ./abis/FxHedgeHook.json
    handler: ./src/handlers/hedge.ts
    events:
      - event: ExposureChanged(bytes32 indexed poolId, bytes32 indexed marketId, address indexed hedgeToken, int256 oldExposureE18, int256 newExposureE18, int256 exposureDeltaE18)
        field_selection:
          transaction_fields:
            - hash
      - event: HedgeRebalanced(bytes32 indexed poolId, bytes32 indexed marketId, address indexed hedgeToken, int256 oldHedgeSizeE18, int256 newHedgeSizeE18, int256 exposureE18, bytes32 pythFeedId)
        field_selection:
          transaction_fields:
            - hash

  # ─────────────────── Lending ────────────────────────────────────
  - name: MorphoBlue
    abi_file_path: ./abis/MorphoBlue.json
    handler: ./src/handlers/lending.ts
    events:
      - event: Supply(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets, uint256 shares)
      - event: Withdraw(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets, uint256 shares)
      - event: Borrow(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets, uint256 shares)
      - event: Repay(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets, uint256 shares)

  # ─────────────────── Telarana gateway + oracle ──────────────────
  - name: TelaranaGatewayHubHook
    abi_file_path: ./abis/TelaranaGatewayHubHook.json
    handler: ./src/handlers/telarana.ts
    events:
      - event: GatewayHubRouteConfigured(bytes32 indexed routeId, uint32 sourceDomain, uint32 destinationDomain, address sourceUsdc, address destinationUsdc, address sourceGatewayWallet, address destinationGatewayMinter, uint8 signerMode, bool enabled, bytes32 metadataRef)
        field_selection:
          transaction_fields:
            - hash
      - event: GatewayHubTransferRequested(bytes32 indexed requestId, bytes32 indexed routeId, address sourceSigner, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: GatewayAtomicFxSwapRequested(bytes32 indexed requestId, bytes32 indexed routeId, address recipient, uint256 amountIn, uint256 minAmountOut)
        field_selection:
          transaction_fields:
            - hash
      - event: GatewayAtomicFxSwapSettled(bytes32 indexed requestId, address tokenOut, uint256 amountOut)
        field_selection:
          transaction_fields:
            - hash
      - event: GatewayHubLiquidityReceived(bytes32 indexed requestId, uint256 amount)
        field_selection:
          transaction_fields:
            - hash

  - name: FxOracle
    abi_file_path: ./abis/FxOracle.json
    handler: ./src/handlers/telarana.ts
    events:
      - event: ConfigUpdated(uint256 maxOracleAge, uint256 maxDeviationBps, uint256 maxConfidenceBps)
        field_selection:
          transaction_fields:
            - hash

  - name: FxHubMessageReceiver
    abi_file_path: ./abis/FxHubMessageReceiver.json
    handler: ./src/handlers/telarana.ts
    events:
      - event: DepositExecuted(bytes32 indexed messageNonce, address indexed beneficiary, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: DepositStranded(bytes32 indexed messageNonce, address indexed beneficiary, uint256 amount, bytes32 reason)
        field_selection:
          transaction_fields:
            - hash
      - event: DepositSwept(bytes32 indexed messageNonce, address indexed beneficiary, uint256 amount)
        field_selection:
          transaction_fields:
            - hash

  # ─────────────────── BuFx request routers ───────────────────────
  - name: BuFxVenueRequestRouter
    abi_file_path: ./abis/BuFxVenueRequestRouter.json
    handler: ./src/handlers/bufx.ts
    events:
      - event: BuFxRequestAccepted(bytes32 indexed requestId, bytes32 requestType, bytes32 marketId, address trader, address referrer, bytes32 campaignId, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: BuFxRfqAccepted(bytes32 indexed requestId, bytes32 marketId, address trader, uint256 amountIn)
        field_selection:
          transaction_fields:
            - hash
      - event: BuFxPerpLiquidityAccepted(bytes32 indexed requestId, bytes32 marketId, address trader, uint256 notionalUsd)
        field_selection:
          transaction_fields:
            - hash
      - event: BuFxRequestFeeQuoted(bytes32 indexed requestId, bytes32 requestType, bytes32 marketId, address trader, address referrer, uint256 amount)
        field_selection:
          transaction_fields:
            - hash

  - name: BuFxTelaranaRequestRouter
    abi_file_path: ./abis/BuFxTelaranaRequestRouter.json
    handler: ./src/handlers/bufx.ts
    events:
      - event: TelaranaRequestSubmitted(bytes32 indexed requestId, bytes32 marketId, address trader, address referrer, bytes32 campaignId, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: TelaranaGatewayMintContextPrepared(bytes32 indexed requestId, bytes32 routeId, address telaranaGatewayHook, uint8 gatewayAction, address sourceDepositor, address sourceSigner, address recipient, address tokenOut, uint256 amount, uint256 minAmountOut, bytes32 spotRouteId, bytes32 metadataRef)
        field_selection:
          transaction_fields:
            - hash
      - event: TelaranaRequestCancelled(bytes32 indexed requestId, address trader)
        field_selection:
          transaction_fields:
            - hash

  # ─────────────────── Bento / Arcade ──────────────────────────────
  - name: FxBentoRoomFactory
    abi_file_path: ./abis/FxBentoRoomFactory.json
    handler: ./src/handlers/bento.ts
    events:
      - event: RoomCreated(uint256 indexed roomId, bytes32 indexed poolId, address indexed entryToken, uint256 entryFee)
        field_selection:
          transaction_fields:
            - hash
      - event: RoomStatusUpdated(uint256 indexed roomId, uint8 status)
        field_selection:
          transaction_fields:
            - hash

  - name: FxBentoRoomEscrow
    abi_file_path: ./abis/FxBentoRoomEscrow.json
    handler: ./src/handlers/bento.ts
    events:
      - event: RoomJoined(uint256 indexed roomId, address indexed player)
        field_selection:
          transaction_fields:
            - hash
      - event: RoomLeft(uint256 indexed roomId, address indexed player)
        field_selection:
          transaction_fields:
            - hash
      - event: RoomCancelled(uint256 indexed roomId)
        field_selection:
          transaction_fields:
            - hash
      - event: RoomLocked(uint256 indexed roomId, uint256 escrowed)
        field_selection:
          transaction_fields:
            - hash
      - event: RoomSettled(uint256 indexed roomId, bytes32 indexed resultsRoot, bytes32 indexed payoutSchemaHash, uint256 payoutTotal, uint256 protocolFee)
        field_selection:
          transaction_fields:
            - hash
      - event: Refunded(uint256 indexed roomId, address indexed player, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: PrizeClaimed(uint256 indexed roomId, address indexed player, uint256 amount)
        field_selection:
          transaction_fields:
            - hash

  - name: FxBentoCommitmentManager
    abi_file_path: ./abis/FxBentoCommitmentManager.json
    handler: ./src/handlers/bento.ts
    events:
      - event: SelectionCommitted(uint256 indexed roomId, uint16 indexed roundIndex, address indexed player, bytes32 commitment)
        field_selection:
          transaction_fields:
            - hash
      - event: SelectionRevealed(uint256 indexed roomId, uint16 indexed roundIndex, address indexed player, bytes32 selectedTilesHash)
        field_selection:
          transaction_fields:
            - hash

  - name: FxBentoRoundManager
    abi_file_path: ./abis/FxBentoRoundManager.json
    handler: ./src/handlers/bento.ts
    events:
      - event: RoundStarted(uint256 indexed roomId, uint16 indexed roundIndex, uint64 startTime, uint64 lockTime, uint64 endTime, uint256 anchorSnapshotId)
        field_selection:
          transaction_fields:
            - hash
      - event: AnchorRecorded(uint256 indexed roomId, uint16 indexed roundIndex, int256 price, uint256 snapshotId)
        field_selection:
          transaction_fields:
            - hash
      - event: SettlementRecorded(uint256 indexed roomId, uint16 indexed roundIndex, int256 price, uint256 snapshotId)
        field_selection:
          transaction_fields:
            - hash

  - name: FxBentoSettlementManager
    abi_file_path: ./abis/FxBentoSettlementManager.json
    handler: ./src/handlers/bento.ts
    events:
      - event: ResultsSubmitted(uint256 indexed roomId, bytes32 indexed resultsRoot, string metadataURI)
        field_selection:
          transaction_fields:
            - hash
      - event: ResultsChallenged(uint256 indexed roomId, bytes proof)
        field_selection:
          transaction_fields:
            - hash
      - event: ChallengeResolved(uint256 indexed roomId, bool accepted)
        field_selection:
          transaction_fields:
            - hash
      - event: ResultsFinalized(uint256 indexed roomId, bytes32 indexed resultsRoot)
        field_selection:
          transaction_fields:
            - hash
      - event: SettlementRescued(uint256 indexed roomId)
        field_selection:
          transaction_fields:
            - hash

