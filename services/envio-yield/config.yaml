# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: bufx-yield-engine

contracts:
  - name: FxOrderSettlement
    abi_file_path: ./abis/FxOrderSettlement.json
    handler: ./src/handlers/perps.ts
    events:
      - event: MatchSettled(bytes32 indexed marketId, address indexed maker, address indexed taker, uint256 fillSizeE18, uint256 fillPriceE18)
        field_selection:
          transaction_fields:
            - hash

  - name: FxPerpClearinghouse
    abi_file_path: ./abis/FxPerpClearinghouse.json
    handler: ./src/handlers/perps.ts
    events:
      - event: PositionIncreased(bytes32 indexed marketId, address indexed trader, int256 sizeDeltaE18, int256 resultingSizeE18, uint256 entryPriceE18, uint256 marginReserved, uint256 fee)
      - event: PositionDecreased(bytes32 indexed marketId, address indexed trader, int256 sizeDeltaE18, int256 resultingSizeE18, uint256 priceE18, uint256 marginReleased, int256 pnl, uint256 badDebt)
      - event: TradingFeeRouted(bytes32 indexed marketId, address indexed trader, address indexed feeVault, uint256 amount)

  - name: FxFundingEngine
    abi_file_path: ./abis/FxFundingEngine.json
    handler: ./src/handlers/perps.ts
    events:
      - event: FundingPoked(bytes32 indexed marketId, uint64 version, int256 rateE18PerSecond, int256 cumulativeFundingE18)

  - name: FxSpotExecutor
    abi_file_path: ./abis/FxSpotExecutor.json
    handler: ./src/handlers/spot.ts
    events:
      - event: SpotFxExecuted(bytes32 indexed requestId, bytes32 indexed routeId, address indexed recipient, address tokenOut, uint256 usdcIn, uint256 tokenOutDelivered, uint256 midE18, uint256 appliedSpreadBps)
        field_selection:
          transaction_fields:
            - hash
      - event: SpotFeeRouted(bytes32 indexed requestId, bytes32 indexed routeId, address indexed feeVault, uint256 amount)
        field_selection:
          transaction_fields:
            - hash

  - name: TurboFeeVault
    abi_file_path: ./abis/TurboFeeVault.json
    handler: ./src/handlers/turboFeeVault.ts
    events:
      - event: FeeDeposited(bytes32 indexed marketId, address token, uint256 amount, uint256 protocolShare, uint256 lpShare, uint256 insuranceShare)
        field_selection:
          transaction_fields:
            - hash
      - event: Deposited(address indexed user, uint256 assets, uint256 shares)
        field_selection:
          transaction_fields:
            - hash
      - event: Withdrawn(address indexed user, uint256 shares, uint256 assets)
        field_selection:
          transaction_fields:
            - hash
      - event: YieldClaimed(address indexed user, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: InsurancePayout(bytes32 indexed marketId, uint256 amount, string reason)
        field_selection:
          transaction_fields:
            - hash

  - name: MorphoBlue
    abi_file_path: ./abis/MorphoBlue.json
    handler: ./src/handlers/lending.ts
    events:
      - event: Supply(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets, uint256 shares)
      - event: Withdraw(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets, uint256 shares)
      - event: Borrow(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets, uint256 shares)
      - event: Repay(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets, uint256 shares)

chains:
  - id: 5042002
    start_block: 0
    contracts:
      - name: FxOrderSettlement
        address:
          - "0xCeae7846c8ED2Dd9E6f541798a657875305EA0d8"
      - name: FxPerpClearinghouse
        address:
          - "0x7707d108F6Ce3d95ceA38D3965448F00C21CaFdC"
      - name: FxFundingEngine
        address:
          - "0xE08a146B9081A8dd32203fC5e7B5988352489518"
      - name: FxSpotExecutor
        address:
          - "0x4e7372108529C0e7cb3aa0fF92B1c52e06e9e72f"
      - name: MorphoBlue
        address:
          - "0x65f435eB4FF05f1481618694bC1ff7Ee4680c0A4"
      - name: TurboFeeVault
        address:
          - "0x929e222CBbC154f8e75a8DEF951288886Df70531"

  - id: 43113
    start_block: 0
    contracts:
      - name: MorphoBlue
        address:
          - "0xeF64621D41093144D9ED8aB8327eE381ECdB79E6"

field_selection:
  transaction_fields:
    - hash
