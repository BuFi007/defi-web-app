# Railway monorepo deployment — each service maps to one `[[services]]` entry.
# GitHub integration auto-deploys all services on push to main.
# Shared env vars are set at project level; per-service overrides in [services.*.variables].

# ── Web Services (HTTP) ──────────────────────────────────

[[services]]
name = "bufi-hyper-mcp"
rootDirectory = "."
buildCommand = "bun install --no-save"
startCommand = "bun apps/hyper-mcp/src/app.ts"
healthcheckPath = "/health"

  [services.variables]
  PORT = "4002"
  BUFI_MCP_URL = "https://mcp.bu.finance"

[[services]]
name = "bufi-api"
rootDirectory = "."
buildCommand = "bun install --no-save"
startCommand = "bun apps/api/src/server.ts"
healthcheckPath = "/health"

  [services.variables]
  PORT = "3002"

# ── Rust Matcher (gRPC + HTTP + consolidated keepers) ─────

[[services]]
name = "matcher"
rootDirectory = "services/matcher"
dockerfilePath = "services/matcher/deploy/Dockerfile"

  [services.variables]
  RUST_LOG = "info"

# ── Indexer ──────────────────────────────────────────────

[[services]]
name = "ponder"
rootDirectory = "."
buildCommand = "bun install --no-save"
startCommand = "cd apps/ponder && bun run start"

  [services.variables]
  PORT = "42069"
