# BUFX Yield Engine — indexed by Envio HyperIndex
# Tracks trading fees, lending rates, and composite yield per market.

type PerpTrade {
  id: ID!
  marketId: String! @index
  maker: String! @index
  taker: String! @index
  sizeDeltaE18: BigInt!
  priceE18: BigInt!
  fee: BigInt!
  txHash: String!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type SpotSwap {
  id: ID!
  requestId: String! @index
  routeId: String! @index
  sender: String! @index
  baseToken: String!
  quoteToken: String!
  baseAmount: BigInt!
  quoteAmount: BigInt!
  midE18: BigInt!
  appliedSpreadBps: BigInt!
  txHash: String!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type FundingEvent {
  id: ID!
  marketId: String! @index
  version: BigInt!
  fundingRateE18: BigInt!
  cumulativeFundingE18: BigInt!
  timestamp: Int!
  chainId: Int!
}

type PositionChange {
  id: ID!
  marketId: String! @index
  trader: String! @index
  action: String! @index
  sizeDeltaE18: BigInt!
  resultingSizeE18: BigInt!
  entryPriceE18: BigInt!
  fee: BigInt!
  realizedPnl: BigInt!
  badDebt: BigInt!
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type LendingEvent {
  id: ID!
  marketId: String! @index
  caller: String!
  onBehalf: String! @index
  assets: BigInt!
  shares: BigInt!
  action: String! @index
  blockNumber: Int!
  timestamp: Int!
  chainId: Int!
}

type TradingFeeRoute {
  id: ID!
  marketId: String! @index
  trader: String! @index
