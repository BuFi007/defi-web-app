name: Perps Canaries

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_arc:
        description: Run the live Arc replacement canary after local checks.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: perps-canaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-perps-canary:
    name: Local Perps Canary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Domain tests
        run: bun test packages/perps packages/db packages/mcp

      - name: Local matcher replacement canary
        run: bun run canary:perps-replacement:local

  live-arc-perps-canary:
    name: Live Arc Perps Canary
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_arc }}
    needs: local-perps-canary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check live Arc secrets
        env:
          ARC_OPERATOR_PRIVATE_KEY: ${{ secrets.ARC_OPERATOR_PRIVATE_KEY }}
        run: |
          if [ -z "$ARC_OPERATOR_PRIVATE_KEY" ]; then
            echo "::error::ARC_OPERATOR_PRIVATE_KEY secret is required for the live Arc canary"
            exit 1
          fi

      - name: Live Arc matcher replacement canary
        env:
          ARC_OPERATOR_PRIVATE_KEY: ${{ secrets.ARC_OPERATOR_PRIVATE_KEY }}
          ARC_RPC_URL: ${{ vars.ARC_RPC_URL || 'https://rpc.drpc.testnet.arc.network' }}
          SMOKE_WAIT_MS: "180000"
        run: bun run canary:perps-replacement:arc
